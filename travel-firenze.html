<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firenze 2024 — Travel</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

  <div class="project-frame">

    <div class="project-header">
      <a class="gallery-nav-link gallery-nav-link--left" href="Travel.html">←&nbsp;Travel</a>
      <a class="gallery-nav-link gallery-nav-link--right" href="index.html">Home</a>
    </div>

    <div class="slideshow" id="slideshow">
      <div class="nav-zone nav-left" id="prevZone" aria-label="Immagine precedente"></div>
      <div class="nav-zone nav-right" id="nextZone" aria-label="Immagine successiva"></div>
      <div class="slide active">
        <img src="images/cover1.jpg" alt="Firenze 1">
      </div>
      <div class="slide">
        <img src="images/cover2.jpg" alt="Firenze 2">
      </div>
      <div class="slide">
        <img src="images/cover3.jpg" alt="Firenze 3">
      </div>
      <!-- aggiungi altri slide qui -->
    </div>

    <div class="slide-counter">
      <span id="current">1</span> / <span id="total"></span>
    </div>

  </div>

<script>
  const slides = document.querySelectorAll('.slide');
  const currentEl = document.getElementById('current');
  const totalEl = document.getElementById('total');
  let index = 0;

  totalEl.textContent = slides.length;

  function goTo(n) {
    slides[index].classList.remove('active');
    index = (n + slides.length) % slides.length;
    slides[index].classList.add('active');
    currentEl.textContent = index + 1;
  }

  document.getElementById('slideshow').addEventListener('click', function(e) {
    const half = this.offsetWidth / 2;
    if (e.clientX > half) goTo(index + 1);
    else goTo(index - 1);
  });

  document.getElementById('prevZone').addEventListener('click', function(e) {
    e.stopPropagation();
    goTo(index - 1);
  });

  document.getElementById('nextZone').addEventListener('click', function(e) {
    e.stopPropagation();
    goTo(index + 1);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight') goTo(index + 1);
    if (e.key === 'ArrowLeft') goTo(index - 1);
  });
</script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.body.addEventListener('click', function(event) {
        const link = event.target.closest('a');
        if (!link) return;

        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || href.startsWith('mailto:') || link.target === '_blank') return;

        const url = new URL(href, window.location.href);
        if (url.origin !== window.location.origin || url.href === window.location.href) return;

        event.preventDefault();
        document.body.classList.add('fade-out');
        setTimeout(function() {
          window.location.href = url.href;
        }, 300);
      });
    });
  </script>

</body>
</html>
